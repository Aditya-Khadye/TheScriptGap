<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Underservedness Heatmap</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e8e6df;
    padding: 32px;
    min-height: 100vh;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #f0ede6;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 32px;
  }
  .heatmap-wrap {
    overflow-x: auto;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 680px;
  }
  th {
    font-size: 12px;
    font-weight: 500;
    color: #aaa;
    padding: 8px 12px;
    text-align: center;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  th.script-col {
    text-align: left;
    min-width: 120px;
  }
  td.script-name {
    font-size: 14px;
    font-weight: 500;
    color: #e8e6df;
    padding: 6px 12px;
    white-space: nowrap;
  }
  td.cell {
    padding: 4px 6px;
    text-align: center;
    cursor: default;
    position: relative;
  }
  .cell-inner {
    border-radius: 6px;
    padding: 10px 8px;
    font-size: 12px;
    font-weight: 500;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .cell-inner:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 10;
    position: relative;
  }
  .tooltip {
    display: none;
    position: fixed;
    background: #1e2030;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e8e6df;
    z-index: 1000;
    pointer-events: none;
    max-width: 200px;
  }
  .tooltip.show { display: block; }
  .tooltip-metric { font-weight: 600; margin-bottom: 4px; }
  .tooltip-raw { color: #aaa; }
  .legend {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #aaa;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
  .tier-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
  }
  tr:hover td.script-name { color: #fff; }
  .note {
    margin-top: 24px;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>

<h1>Script Underservedness — Index Comparison</h1>
<p class="subtitle">
  TRC / Monotype / UCF MIT2 Lab · All values normalized 0–1 · Sorted by Gap Score (most underserved first)
</p>

<div class="heatmap-wrap">
  <table id="heatmap">
    <thead>
      <tr>
        <th class="script-col">Script</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="legend" id="legend"></div>
<p class="note">Hover over any cell for the raw value. Gap Score = composite underservedness signal.</p>

<div class="tooltip" id="tooltip"></div>

<script>
const data = [{"script": "Devanagari", "cells": [{"norm": 0.5135, "raw": "192,989", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.5268, "raw": "62", "label": "Font Support", "color": "#1D9E75"}, {"norm": 1.0, "raw": "0.847", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.166, "raw": "0.166", "label": "Diversity", "color": "#EF9F27"}, {"norm": 1.0, "raw": "1.557", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Bengali", "cells": [{"norm": 0.1171, "raw": "23,006", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.0, "raw": "11", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.7264, "raw": "0.615", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.1552, "raw": "0.155", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.9475, "raw": "1.415", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Arabic", "cells": [{"norm": 0.4609, "raw": "145,526", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.4848, "raw": "54", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.6384, "raw": "0.541", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.3811, "raw": "0.381", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.6586, "raw": "0.629", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Tamil", "cells": [{"norm": 0.0461, "raw": "15,721", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.1326, "raw": "17", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.343, "raw": "0.290", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.0, "raw": "0.000", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.6232, "raw": "0.533", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Telugu", "cells": [{"norm": 0.0, "raw": "12,278", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.2736, "raw": "27", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.511, "raw": "0.433", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.3583, "raw": "0.358", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.5203, "raw": "0.253", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Cyrillic", "cells": [{"norm": 1.0, "raw": "2,623,937", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 1.0, "raw": "293", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.1969, "raw": "0.167", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.6475, "raw": "0.647", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.1498, "raw": "-0.754", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Han", "cells": [{"norm": 0.384, "raw": "96,340", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.2953, "raw": "29", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.0022, "raw": "0.002", "label": "Complexity", "color": "#E24B4A"}, {"norm": 0.7491, "raw": "0.749", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.1314, "raw": "-0.804", "label": "Gap Score", "color": "#7F77DD"}]}, {"script": "Katakana", "cells": [{"norm": 0.6649, "raw": "434,832", "label": "Web Exposure", "color": "#3B8BD4"}, {"norm": 0.5505, "raw": "67", "label": "Font Support", "color": "#1D9E75"}, {"norm": 0.0, "raw": "0.000", "label": "Complexity", "color": "#E24B4A"}, {"norm": 1.0, "raw": "1.000", "label": "Diversity", "color": "#EF9F27"}, {"norm": 0.0, "raw": "-1.161", "label": "Gap Score", "color": "#7F77DD"}]}];
const metrics = [{"label": "Web Exposure", "desc": "Higher = more readers", "color": "#3B8BD4"}, {"label": "Font Support", "desc": "Higher = more fonts", "color": "#1D9E75"}, {"label": "Complexity", "desc": "Higher = harder to engineer", "color": "#E24B4A"}, {"label": "Diversity", "desc": "Higher = more visual choice", "color": "#EF9F27"}, {"label": "Gap Score", "desc": "Higher = more underserved", "color": "#7F77DD"}];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function cellColor(norm, hexColor) {
  const rgb = hexToRgb(hexColor);
  const alpha = 0.15 + norm * 0.75;
  const lightness = 1 - norm * 0.6;
  return {
    bg: `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`,
    text: norm > 0.55 ? `rgba(${rgb.r*0.4},${rgb.g*0.4},${rgb.b*0.4},1)` : `rgba(${Math.min(255,rgb.r+80)},${Math.min(255,rgb.g+80)},${Math.min(255,rgb.b+80)},0.9)`,
  };
}

// Build header
const thead = document.querySelector('thead tr');
metrics.forEach(m => {
  const th = document.createElement('th');
  th.textContent = m.label;
  th.title = m.desc;
  thead.appendChild(th);
});

// Build rows
const tbody = document.getElementById('tbody');
data.forEach((row, ri) => {
  const tr = document.createElement('tr');

  // Script name cell with tier badge
  const tdName = document.createElement('td');
  tdName.className = 'script-name';
  const gapNorm = row.cells[4].norm;
  const tier = gapNorm > 0.6 ? ['Underserved','#E24B4A','#FCEBEB'] :
               gapNorm > 0.3 ? ['Moderate','#EF9F27','#FAEEDA'] :
                               ['Well served','#1D9E75','#E1F5EE'];
  tdName.innerHTML = `${row.script}<span class="tier-badge" style="background:${tier[2]};color:${tier[1]}">${tier[0]}</span>`;
  tr.appendChild(tdName);

  // Metric cells
  row.cells.forEach((cell, ci) => {
    const td = document.createElement('td');
    td.className = 'cell';
    const colors = cellColor(cell.norm, metrics[ci].color);
    const inner = document.createElement('div');
    inner.className = 'cell-inner';
    inner.style.background = colors.bg;
    inner.style.color = colors.text;
    inner.textContent = (cell.norm * 100).toFixed(0) + '%';

    // Tooltip
    inner.addEventListener('mousemove', (e) => {
      const tt = document.getElementById('tooltip');
      tt.innerHTML = `<div class="tooltip-metric" style="color:${metrics[ci].color}">${cell.label}</div>
        <div>Normalized: <strong>${(cell.norm*100).toFixed(1)}%</strong></div>
        <div class="tooltip-raw">Raw value: ${cell.raw}</div>
        <div class="tooltip-raw" style="margin-top:4px;font-style:italic">${metrics[ci].desc}</div>`;
      tt.classList.add('show');
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top = (e.clientY - 10) + 'px';
    });
    inner.addEventListener('mouseleave', () => {
      document.getElementById('tooltip').classList.remove('show');
    });

    td.appendChild(inner);
    tr.appendChild(td);
  });

  tbody.appendChild(tr);
});

// Legend
const legend = document.getElementById('legend');
metrics.forEach(m => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${m.color}"></div>${m.label}: ${m.desc}`;
  legend.appendChild(item);
});
</script>
</body>
</html>
